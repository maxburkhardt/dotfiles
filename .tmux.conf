# ========
# General
# ========

set -g prefix C-b
bind b send-prefix
unbind C-b

set -sg escape-time 0

if-shell 'test "$(uname -s)" = Darwin' \
  'set -g @dotfiles_root /Users/maxb/dotfiles' \
  'set -g @dotfiles_root /home/maxb/dotfiles'

set -g base-index 1
set -g buffer-limit 10
# Use a tmux-aware TERM so apps (like vim) get correct color/mouse capabilities.
set -g default-terminal "tmux-256color"
# Ghostty supports OSC 8 hyperlinks; make tmux preserve them.
set -g 'terminal-features[10]' 'xterm-ghostty:hyperlinks'
set -g history-limit 10000
set -g status-interval 10
set -g status-key vi
#set -g visual-activity on
set -g visual-bell on

setw -g aggressive-resize on
setw -g mode-keys vi

# Allow tmux copy-mode to write the clipboard, but block pane apps from doing it.
set-option -g set-clipboard external
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# =====
# Look
# =====

set -g message-style bg=blue,fg=black

set -g pane-active-border-style bg=default,fg=white
set -g pane-border-style bg=default,fg=blue

set -g status-style bg=default
set -g status-fg blue
set -g status-justify centre
set -g status-left '%H:%M #[fg=white]| #[default]#H #[fg=white]| #[default]#I-#P '
set -g status-left-length 50
set -g status-right "#(#{@dotfiles_root}/.tmux/stats.sh)"
set -g status-right-length 120

setw -g clock-mode-colour blue
setw -g clock-mode-style 24
setw -g monitor-activity on
setw -g window-status-current-style fg=white

# =============
# Key bindings
# =============

bind R source ~/.tmux.conf

#
# Window management
#

unbind n
unbind p
unbind y

bind w list-windows
bind . last-window

bind -r p previous-window
bind -r n next-window
bind -r < swap-window -t :-
bind -r > swap-window -t :+

bind -n F1 select-window -t 1
bind -n F2 select-window -t 2
bind -n F3 select-window -t 3
bind -n F4 select-window -t 4
bind -n F5 select-window -t 5
bind -n F6 select-window -t 6
bind -n F7 select-window -t 7
bind -n F8 select-window -t 8
bind -n F9 select-window -t 9
bind -n F10 select-window -t 10

#
# Pane management
#

bind e list-panes
bind \; last-pane

bind -r '{' swap-pane -U
bind -r '}' swap-pane -D
bind -r ( rotate-window -U
bind -r ) rotate-window -D

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r C-h resize-pane -L 1
bind -r C-j resize-pane -D 1
bind -r C-k resize-pane -U 1
bind -r C-l resize-pane -R 1

bind -r '\' next-layout
bind -r | previous-layout

bind c new-window -c '#{pane_current_path}'
bind % split-window -h -c '#{pane_current_path}'
bind '"' split-window -v -c '#{pane_current_path}'

#
# Copy & paste
#

# bind Space copy-mode
# bind p paste-buffer
# bind P paste-buffer -d
# bind - delete-buffer
# bind = list-buffers
# bind + choose-buffer


#
# Mouse mode
#

set -g mouse on
# Command-click is handled by Ghostty before mouse reporting; with tmux mouse
# mode on, use Option-click to open the hyperlink or URL under the pointer.
bind-key -n M-MouseDown1Pane if-shell "TMUX_MOUSE_HYPERLINK=#{q:mouse_hyperlink} TMUX_MOUSE_LINE=#{q:mouse_line} TMUX_MOUSE_X=#{mouse_x} sh #{@dotfiles_root}/.tmux/open-url-under-mouse.sh" "display-message -d 750 'Opened URL'" "select-pane -t = ; send-keys -M"

# Smart pane switching with awareness of vim splits
bind -n C-h run "(tmux display-message -p '#{pane_current_command}' | grep -iqE '(^|\/)g?(view|n?vim?)(diff)?$' && tmux send-keys C-h) || tmux select-pane -L"
bind -n C-j run "(tmux display-message -p '#{pane_current_command}' | grep -iqE '(^|\/)g?(view|n?vim?)(diff)?$' && tmux send-keys C-j) || tmux select-pane -D"
bind -n C-k run "(tmux display-message -p '#{pane_current_command}' | grep -iqE '(^|\/)g?(view|n?vim?)(diff)?$' && tmux send-keys C-k) || tmux select-pane -U"
bind -n C-l run "(tmux display-message -p '#{pane_current_command}' | grep -iqE '(^|\/)g?(view|n?vim?)(diff)?$' && tmux send-keys C-l) || tmux select-pane -R"
bind -n C-'\' run "(tmux display-message -p '#{pane_current_command}' | grep -iqE '(^|\/)g?(view|n?vim?)(diff)?$' && tmux send-keys 'C-\\') || tmux select-pane -l"

# Put selections into the system clipboard
bind-key -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"
